name: azmusic
description: Private family music practice system for violin-family students.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local persistence
  drift: ^2.15.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.20

  # Networking
  crypto: ^3.0.7
  dio: ^5.4.0
  http: ^1.2.0

  # Camera and QR pairing
  camera: ^0.12.0+1
  camera_windows: ^0.2.6+4
  qr_code_dart_decoder: ^0.1.2

  # File handling
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^11.0.2
  open_filex: ^4.5.0
  url_launcher: ^6.3.0

  # PDF rendering
  printing: ^5.11.1
  syncfusion_flutter_pdfviewer: ^33.2.7

  # Media playback
  just_audio: ^0.9.36
  audio_session: ^0.1.20

  # UI utilities
  flutter_slidable: ^3.0.1
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0
  mobile_scanner: ^7.2.0

  # Configuration
  envied: ^0.5.3
  shared_preferences: ^2.2.2

  # Diagnostics
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  riverpod_generator: ^2.3.9
  envied_generator: ^0.5.3
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
